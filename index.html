<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최빼꼼의힐링곳간</title>
    <style>
        /* 1. 귀여운 파스텔톤 배경과 패턴 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #fff0f5; /* 러블리한 라벤더 핑크 배경 */
            background-image: radial-gradient(#ffd1dc 20%, transparent 20%),
                              radial-gradient(#ffd1dc 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. 메인 컨테이너 디자인 (둥글둥글하고 아기자기한 스타일) */
        .container {
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 30px; /* 더 동글동글하게 */
            border: 4px solid #ffb7c5; /* 딸기우유색 테두리 */
            box-shadow: 0 10px 0px #ffccd5; /* 입체감 있는 귀여운 그림자 */
            text-align: center;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            position: relative;
        }

        /* 3. 귀여운 상단 캐릭터 헤더 */
        .character-header {
            font-size: 50px;
            margin-bottom: 5px;
            animation: bounce 2s infinite ease-in-out;
        }

        /* 통통 튀는 애니메이션 효과 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h2 { 
            color: #ff6f91; /* 러블리 핑크 */
            margin-top: 5px;
            margin-bottom: 25px;
            font-size: 24px;
            text-shadow: 1px 1px 0px #ffe4e1;
        }
        
        /* 4. 노래 재생 목록 스타일 */
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            text-align: left;
        }
        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background-color: #fff9fa;
            border: 2px dashed #ffcad4; /* 점선 테두리로 귀여움 업 */
            border-radius: 18px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        .playlist-item.active {
            border-color: #ff6f91;
            background-color: #fff0f3;
            transform: scale(1.02);
        }
        .playlist-item.disabled {
            opacity: 0.5;
            background-color: #eaeaea;
            border-color: #ccc;
            border-style: solid;
            pointer-events: none;
        }
        .song-info {
            flex-grow: 1;
            margin-right: 20px;
            text-align: left;
        }
        .song-title {
            font-weight: bold;
            font-size: 16px;
            color: #4a4a4a;
            margin-bottom: 5px;
        }
        .song-count {
            font-size: 12px;
            color: #ffa5b8; /* 분홍분홍한 서브 텍스트 */
            font-weight: bold;
        }
        
        /* 5. 동글동글 폭신폭신한 재생 버튼 */
        .play-btn {
            background-color: #ff8da1;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 0px #e05e76; /* 입체적인 버튼 버튼 */
        }
        .play-btn:hover {
            background-color: #ff758f;
            transform: translateY(-2px);
            box-shadow: 0 6px 0px #e05e76;
        }
        .play-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .play-btn.playing {
            background-color: #ff4757;
            box-shadow: 0 4px 0px #c0392b;
        }
        .play-btn.disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: default;
        }

        /* 6. 귀여운 에러 메시지 */
        .error-msg { 
            color: #ff6b81; 
            font-weight: bold; 
            display: none; 
            line-height: 1.6;
            margin-top: 25px;
            font-size: 16px;
        }
        .sad-character {
            font-size: 60px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 상단에서 춤추는 귀여운 음표 요정 캐릭터 -->
    <div class="character-header" id="charHeader">(음 •̀ω•́)♬</div>
    <h2 id="pageTitle">23시까지 재생가능.이 후 자동폐쇄</h2>
    
    <!-- 오디오 엘리먼트 (화면에서 숨김) -->
    <audio id="audioPlayer"></audio>
    
    <!-- 재생 목록 영역 -->
    <ul class="playlist" id="playlist"></ul>
    
    <!-- 전체 유효기간 만료 / 재생 제한 메시지 -->
    <div class="error-msg" id="globalErrorMsg">
        <div class="sad-character">(இ﹏இ`｡)</div>
        <p>잉... 마법이 풀렸어요!<br>지정된 시간이나 횟수가 초과되어<br>노래를 더 이상 들을 수 없습니다.</p>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const playlistContainer = document.getElementById('playlist');
    const globalErrorMsg = document.getElementById('globalErrorMsg');
    const pageTitle = document.getElementById('pageTitle');
    const charHeader = document.getElementById('charHeader');

    // 1. ⚙️ 노래 목록 및 기한 설정
    const songs = [
        { id: "song1", title: "🌷 1번 설레는 봄날의 왈츠", file: "SUNSHINELOVE.mp3" },
        { id: "song2", title: "🧸 2번 아기곰의 밤하늘 산책", file: "music2.mp3" },
        { id: "song3", title: "🌙 3번 달콤한 한 스푼의 꿈", file: "music3.mp3" }
    ];

    const maxPlays = 3; // 노래별 최대 재생 횟수

    /* 
      ⏱️ 전체 페이지 만료일 설정 (연, 월-1, 일, 시, 분)
    */
    const expirationDate = new Date(2026, 6, 16, 20, 30); 

    let currentPlayingId = null; 
    let liveTimer = null; 

    // 2. 만료 시간 및 상태 검증
    function checkExpiration() {
        const now = new Date();
        if (now > expirationDate) {
            if (!audio.paused) {
                audio.pause();
                audio.src = '';
                currentPlayingId = null;
            }

            songs.forEach(song => {
                localStorage.setItem(`playCount_${song.id}`, maxPlays);
            });

            playlistContainer.style.display = 'none';
            charHeader.innerText = "(இ﹏இ`｡)"; // 상단 캐릭터를 슬픈 얼굴로 변경
            charHeader.style.animation = 'none';
            globalErrorMsg.style.display = 'block';

            if (liveTimer) {
                clearInterval(liveTimer);
            }
            return true;
        }
        return false;
    }

    // 3. 플레이리스트 그리기
    function renderPlaylist() {
        playlistContainer.innerHTML = '';
        let allDisabled = true;
        
        songs.forEach(song => {
            const playCount = parseInt(localStorage.getItem(`playCount_${song.id}`)) || 0;
            const remaining = maxPlays - playCount;
            const isDisabled = remaining <= 0;

            if (!isDisabled) {
                allDisabled = false;
            }

            const li = document.createElement('li');
            li.className = `playlist-item ${isDisabled ? 'disabled' : ''} ${currentPlayingId === song.id ? 'active' : ''}`;
            li.id = `item_${song.id}`;

            const infoDiv = document.createElement('div');
            infoDiv.className = 'song-info';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'song-title';
            titleDiv.innerText = song.title;

            const countDiv = document.createElement('div');
            countDiv.className = 'song-count';
            countDiv.innerText = isDisabled ? "기회를 모두 다 썼어요! ❌" : `남은 연주 기회: ⭐️ ${remaining}회`;

            infoDiv.appendChild(titleDiv);
            infoDiv.appendChild(countDiv);

            const btn = document.createElement('button');
            btn.className = `play-btn ${isDisabled ? 'disabled' : ''} ${(currentPlayingId === song.id && !audio.paused) ? 'playing' : ''}`;
            btn.innerText = (currentPlayingId === song.id && !audio.paused) ? "정지" : "재생";
            
            if (!isDisabled) {
                btn.onclick = () => togglePlay(song.id, song.file);
            }

            li.appendChild(infoDiv);
            li.appendChild(btn);
            playlistContainer.appendChild(li);
        });

        // 만약 모든 노래의 횟수를 소진했다면 슬픈 요정 화면으로 전환
        if (allDisabled) {
            playlistContainer.style.display = 'none';
            charHeader.innerText = "(ಥ﹏ಥ)";
            charHeader.style.animation = 'none';
            globalErrorMsg.style.display = 'block';
        }
    }

    // 4. 재생 횟수를 실제로 1 차감시키는 내부 함수
    function deductPlayCount(songId) {
        let playCount = parseInt(localStorage.getItem(`playCount_${songId}`)) || 0;
        if (playCount < maxPlays) {
            playCount++;
            localStorage.setItem(`playCount_${songId}`, playCount);
        }
    }

    // 5. 노래 제어 함수 (재생/정지)
    function togglePlay(songId, songFile) {
        if (checkExpiration()) return;

        // 다른 노래가 이미 재생 중이었다면 정지
        if (currentPlayingId && currentPlayingId !== songId) {
            audio.pause();
        }

        // 재생 상태 전환
        if (currentPlayingId === songId && !audio.paused) {
            audio.pause();
            charHeader.innerText = "(음 •̀ω•́)♬"; // 정지하면 원래 표정
        } else {
            deductPlayCount(songId); 
            
            currentPlayingId = songId;
            audio.src = songFile;
            audio.play();
            charHeader.innerText = "⸜(*ˊᗜˋ*)⸝"; // 노래 재생 시 신난 표정
        }

        renderPlaylist();
    }

    // 6. 한 노래가 완전히 끝났을 때 처리
    audio.onended = function() {
        currentPlayingId = null;
        audio.src = ''; 
        charHeader.innerText = "(음 •̀ω•́)♬";
        renderPlaylist();
        checkExpiration();
    };

    // 7. 1초마다 실시간 유효 시간 체크
    liveTimer = setInterval(() => {
        const isExpired = checkExpiration();
        if (isExpired) {
            renderPlaylist();
        }
    }, 1000);

    // 초기 실행
    checkExpiration();
    renderPlaylist();
</script>

</body>
</html>
