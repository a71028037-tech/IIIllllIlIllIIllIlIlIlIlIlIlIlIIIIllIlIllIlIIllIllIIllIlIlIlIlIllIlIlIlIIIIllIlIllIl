<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ㅊㅃㄲㅇ ㅈㅋㅂㅅ🎵</title>

<style>

body{
    margin:0;
    background:#f8f8ff;
    font-family:"Pretendard",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#player{
    width:1080px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

video{
    width:100%;
    border-radius:20px;
    background:black;
}

#info{
    text-align:center;
    font-size:18px;
    margin-bottom:18px;
    line-height:1.8;
}

#controls{
    margin-top:20px;
    text-align:center;
}

#volumeBox{
    margin-top:20px;
    text-align:center;
    font-size:16px;
    font-weight:bold;
}

#volume{
    width:250px;
    margin:0 10px;
    vertical-align:middle;
}

button{
    background:#ff8fc7;
    color:white;
    border:none;
    border-radius:40px;
    padding:14px 28px;
    margin:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 6px 12px rgba(0,0,0,.18);
}

button:hover{
    transform:translateY(-2px);
    background:#ff69b4;
}

button:active{
    transform:scale(.95);
}

button:disabled{
    background:#bdbdbd;
    cursor:not-allowed;
}

</style>

</head>

<body>

<div id="player">


<div id="info">

📺 사용 횟수 :
<b><span id="used"></span></b>회<br>

💖 남은 횟수 :
<b><span id="remain"></span></b>회

</div>



<video
id="video"
playsinline
controlsList="nodownload nofullscreen noremoteplayback"
disablePictureInPicture
>

<source src="SUNSHINE LOVE.mp4" type="video/mp4">

</video>



<!-- 볼륨 조절 -->

<div id="volumeBox">

🔊 볼륨 :

<input 
type="range" 
id="volume" 
min="0" 
max="100" 
value="100">

<span id="volumeValue">100%</span>

</div>



<div id="controls">

<button id="playBtn">
▶️ 재생
</button>

<button id="pauseBtn">
⏸️ 정지
</button>

</div>


</div>



<script>


const MAX_PLAY = 3;

const STORAGE_KEY="video_play_count";


const videoTitle = "Healing Box";

const videoDescription = "당일 23시까지 사용가능. 미사용분 자동삭제.";


const video=document.getElementById("video");

const playBtn=document.getElementById("playBtn");

const pauseBtn=document.getElementById("pauseBtn");


const used=document.getElementById("used");

const remain=document.getElementById("remain");


const volume=document.getElementById("volume");

const volumeValue=document.getElementById("volumeValue");



let count=Number(localStorage.getItem(STORAGE_KEY)||0);


let isPlayingSession=false;



function updateInfo(){


    let left=MAX_PLAY-count;


    used.innerText=count;

    remain.innerText=left;



    if(left<=0){

        playBtn.disabled=true;

        playBtn.innerHTML="🔒 재생 불가";

    }else{

        playBtn.disabled=false;

        playBtn.innerHTML="▶️ 재생";

    }

}



updateInfo();




playBtn.onclick=async()=>{


    if(video.ended){

        video.currentTime=0;

        isPlayingSession=false;

    }



    if(!isPlayingSession){


        if(count>=MAX_PLAY){

            alert("재생 횟수를 모두 사용했습니다.");

            return;

        }


        count++;


        localStorage.setItem(STORAGE_KEY,count);


        updateInfo();


        isPlayingSession=true;


    }



    try{


        await video.play();



        if(document.pictureInPictureEnabled &&
           !document.pictureInPictureElement){


            try{

                await video.requestPictureInPicture();

            }catch(e){

                console.log("자동 PiP 제한");

            }

        }


    }catch(e){

        console.log(e);

    }


};



pauseBtn.onclick=()=>{

    video.pause();

};



// 볼륨 기능

volume.oninput=()=>{


    let value=volume.value;


    video.volume=value/100;


    volumeValue.innerText=value+"%";


};



// 초기 볼륨

video.volume=1;



video.onended=()=>{

    isPlayingSession=false;

};



// 우클릭 방지

document.addEventListener("contextmenu", function(e){

    e.preventDefault();

});


</script>


</body>

</html>
