<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탑클래스쥬크박스♬</title>
    <style>
        /* 1. 몽환적인 보랏빛 파스텔 그라데이션 배경 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%), 
                        linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            background-blend-mode: multiply;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. 반투명한 유리 느낌의 신비로운 카드 디자인 */
        .container {
            background: rgba(255, 255, 255, 0.85); /* 반투명 백그라운드 */
            backdrop-filter: blur(10px); /* 뒤 배경을 흐리게 처리해 투명 유리 효과 부여 */
            padding: 40px 30px;
            border-radius: 30px;
            border: 3px solid #e0c3fc; /* 연보라색 부드러운 테두리 */
            box-shadow: 0 12px 25px rgba(142, 197, 252, 0.3); /* 신비로운 푸른 빛 그림자 */
            text-align: center;
            width: 100%;
            max-width: 710px;
            box-sizing: border-box;
            position: relative;
        }

        /* 3. 통통 튀는 밤하늘 우주 요정 */
        .character-header {
            font-size: 55px;
            margin-bottom: 5px;
            display: inline-block;
            animation: bounce 2.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        /* 4. 그라데이션이 적용된 몽환적인 타이틀 텍스트 */
        h2 { 
            background: linear-gradient(120deg, #a18cd1 0%, #fbc2eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; /* 글씨 내부에 그라데이션을 채웁니다 */
            margin: 3px 0;
            line-height: 1.3;
            font-size: 23px;
            font-weight: bold;
            letter-spacing: -0.2px;
        }
        
        /* 5. 파스텔 톤의 재생 목록 스타일 */
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            text-align: left;
        }
        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 2px dashed #d6e4ff; /* 몽환적인 연하늘색 점선 */
            border-radius: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        .playlist-item.active {
            border-color: #b19ffb;
            background-color: rgba(240, 243, 255, 0.9);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(177, 159, 251, 0.15);
        }
        .playlist-item.disabled {
            opacity: 0.4;
            background-color: rgba(230, 230, 230, 0.5);
            border-color: #ccc;
            border-style: solid;
            pointer-events: none;
        }
        .song-info {
            flex-grow: 1;
            margin-right: 20px;
            text-align: left;
        }
        .song-title {
            font-weight: bold;
            font-size: 18px;
            color: #5352ed; /* 새벽 하늘을 닮은 푸른빛 글씨 */
            margin-bottom: 5px;
        }
        .song-count {
            font-size: 16px;
            color: #b2bec3;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        /* 6. 신비로운 보라-핑크 그라데이션 동글 버튼 */
        .play-btn {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); /* 산뜻한 블루 그라데이션 */
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(161, 196, 253, 0.4);
        }
        .play-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 15px rgba(161, 196, 253, 0.6);
        }
        .play-btn:active {
            transform: translateY(1px);
        }
        /* 노래 재생 중일 때의 몽환적인 핑크-보라 그라데이션 버튼 */
        .play-btn.playing {
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%);
            box-shadow: 0 4px 10px rgba(251, 194, 235, 0.5);
        }
        .play-btn.disabled {
            background: #dfe6e9;
            box-shadow: none;
            cursor: default;
        }

        /* 7. 귀여운 달나라 감성 에러 메시지 */
        .error-msg { 
            color: #747d8c; 
            font-weight: bold; 
            display: none; 
            line-height: 1.6;
            margin-top: 25px;
            font-size: 18px;
        }
        .sad-character {
            font-size: 65px;
            margin-bottom: 15px;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 상단에서 둥실둥실 떠 있는 밤하늘 별나라 요정 -->
    <div class="character-header" id="charHeader">＼(^_^)／</div>
    <h2 class="pageTitle">당일 23시까지만 재생할 수 있어요</h2>
    <h2 class="pageTitle">재생버튼을 누르면 1회씩 즉시차감됩니다</h2>
    <h2 class="pageTitle">부여받은 본인번호만 재생하세요~ 타인번호 재생시 제제됩니다.</h2>    
    
    <!-- 오디오 엘리먼트 (화면에서 숨김) -->
<video
    id="videoPlayer"
    width="100%"
    height="400"
    playsinline
    preload="metadata"
    style="
        width:100%;
        max-width:700px;
        height:auto;
        display:block;
        margin:20px auto;
        border-radius:15px;
        background:#000;
    ">
</video>

    <div style="margin:10px 0;">
    <button id="fullscreenBtn" class="play-btn" style="width:120px; border-radius:20px;">
        ⛶ 전체화면
    </button>
</div>

<video
    id="videoPlayer"
    playsinline
    preload="metadata"
    controlsList="nodownload nofullscreen noremoteplayback"
    disablePictureInPicture>
</video>
    
    <!-- 재생 목록 영역 -->
    <ul class="playlist" id="playlist"></ul>
    
    <!-- 전체 유효기간 만료 / 재생 제한 메시지 -->
    <div class="error-msg" id="globalErrorMsg">
        <div class="sad-character">😭😭😭😭</div>
        <p>지정된 횟수가 모두 소진되었습니다.<br>아쉽지만 점수를 차곡차곡 잘 모아<br>다음 기회에 이용해주세요!</p>
    </div>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const playlistContainer = document.getElementById('playlist');
    const globalErrorMsg = document.getElementById('globalErrorMsg');
    const pageTitle = document.getElementById('pageTitle');
    const charHeader = document.getElementById('charHeader');

    // 1. ⚙️ 노래 목록 및 기한 설정
    const songs = [
    { id: "song1", title: "🎬 1번 영상", file: "SUNSHINE LOVE.mp4" },
    { id: "song2", title: "🎬 2번 영상", file: "video2.mp4" },
    { id: "song3", title: "🎬 3번 영상", file: "video3.mp4" }
];

    const maxPlays = 4; // 최대 재생 횟수

    /* 
      ⏱️ 만료일 (연, 월-1, 일, 시, 분)
      (2026, 6, 31, 23, 59) -> 2026년 7월 31일 23시 59분 만료
    */
    const expirationDate = new Date(2026, 6, 17, 24, 00); 

    let currentPlayingId = null; 
    let liveTimer = null; 

    // 2. 만료 시간 및 상태 검증
    function checkExpiration() {
        const now = new Date();
        if (now > expirationDate) {
        if (!video.paused) {
        video.pause();
        video.src = '';
        currentPlayingId = null;
    }
            songs.forEach(song => {
                localStorage.setItem(`playCount_${song.id}`, maxPlays);
            });

            playlistContainer.style.display = 'none';
            charHeader.innerText = "＼(^_^)／"; // 밤하늘에 별똥별이 떨어진 슬픈 표정
            charHeader.style.animation = 'none';
            globalErrorMsg.style.display = 'block';

            if (liveTimer) {
                clearInterval(liveTimer);
            }
            return true;
        }
        return false;
    }

    // 3. 플레이리스트 그리기
function renderPlaylist() {
    playlistContainer.innerHTML = '';
    let allDisabled = true;

    songs.forEach(song => {

        const playCount =
            parseInt(localStorage.getItem(`playCount_${song.id}`)) || 0;

        const remaining = maxPlays - playCount;

        const isDisabled = remaining <= 0;

        if (!isDisabled) allDisabled = false;

        const li = document.createElement('li');

        li.className =
            `playlist-item ${
                isDisabled ? 'disabled' : ''
            } ${
                currentPlayingId === song.id ? 'active' : ''
            }`;

        li.id = `item_${song.id}`;

        const infoDiv = document.createElement('div');
        infoDiv.className = 'song-info';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'song-title';
        titleDiv.innerText = song.title;

        const countDiv = document.createElement('div');
        countDiv.className = 'song-count';

        if (isDisabled) {
            countDiv.innerText = "모든 재생횟수 소진! ❌";
        } else {
            countDiv.innerText =
                `남은 영상 재생 횟수 : ✨ ${remaining}회`;
        }

        infoDiv.appendChild(titleDiv);
        infoDiv.appendChild(countDiv);

        const btn = document.createElement('button');

        btn.className =
            `play-btn ${
                isDisabled ? 'disabled' : ''
            } ${
                currentPlayingId === song.id &&
                !video.paused
                    ? 'playing'
                    : ''
            }`;

        btn.innerText =
            currentPlayingId === song.id &&
            !video.paused
                ? "정지"
                : "재생";

        if (!isDisabled) {
            btn.onclick = () => {
                togglePlay(song.id, song.file);
            };
        }

        li.appendChild(infoDiv);
        li.appendChild(btn);

        playlistContainer.appendChild(li);

    });

    if (allDisabled) {

        playlistContainer.style.display = 'none';

        charHeader.innerText = "＼(^_^)／";

        charHeader.style.animation = 'none';

        globalErrorMsg.style.display = 'block';

    }
}

    // 4. 재생 횟수를 실제로 1 차감시키는 내부 함수
    function deductPlayCount(songId) {
        let playCount = parseInt(localStorage.getItem(`playCount_${songId}`)) || 0;
        if (playCount < maxPlays) {
            playCount++;
            localStorage.setItem(`playCount_${songId}`, playCount);
        }
    }

function togglePlay(songId, videoFile) {

    if (checkExpiration()) return;

    // 같은 영상이 재생 중이면 정지
    if (currentPlayingId === songId && !video.paused) {

        video.pause();

        charHeader.innerText = "☆(❁´◡`❁)☆";

        renderPlaylist();

        return;
    }

    // 같은 영상을 정지 후 다시 재생
    if (currentPlayingId === songId && video.paused) {

        video.play();

        charHeader.innerText = "⸜(*╹▽╹*)⚝";

        renderPlaylist();

        return;
    }

    // 다른 영상 선택
    if (currentPlayingId && currentPlayingId !== songId) {

        video.pause();

    }

    // 새 영상만 재생횟수 차감
    deductPlayCount(songId);

    currentPlayingId = songId;

    video.src = videoFile;

    video.load();

    video.play();

    charHeader.innerText = "⸜(*╹▽╹*)⚝";

    renderPlaylist();
}

    // 6. 한 노래가 완전히 끝났을 때 처리
video.onended = function() {

    currentPlayingId = null;

    video.pause();

    video.removeAttribute("src");

    video.load();

    charHeader.innerText = "☆(❁´◡`❁)☆";

    renderPlaylist();

    checkExpiration();

};

    // 7. 1초마다 실시간 유효 시간 체크
    liveTimer = setInterval(() => {
        const isExpired = checkExpiration();
        if (isExpired) {
            renderPlaylist();
        }
    }, 1000);

    // 초기 실행
    checkExpiration();
    renderPlaylist();
</script>

</body>
</html>
