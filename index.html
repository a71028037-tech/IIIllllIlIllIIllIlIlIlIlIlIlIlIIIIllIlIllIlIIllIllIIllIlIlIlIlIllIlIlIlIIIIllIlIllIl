<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ㅊㅃㄲㅇ ㅈㅋㅂㅅ🎵</title>

<style>

body{
    margin:0;
    background:#f8f8ff;
    font-family:"Pretendard",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#player{
    width:1080px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

video{
    width:100%;
    border-radius:20px;
    background:black;
}

#info{
    text-align:center;
    font-size:18px;
    margin-bottom:18px;
    line-height:1.8;
}

#controls{
    margin-top:20px;
    text-align:center;
}

#volumeBox{
    margin-top:20px;
    text-align:center;
    font-size:16px;
    font-weight:bold;
}

#volume{
    width:250px;
    margin:0 10px;
    vertical-align:middle;
}

button{
    background:#ff8fc7;
    color:white;
    border:none;
    border-radius:40px;
    padding:14px 28px;
    margin:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 6px 12px rgba(0,0,0,.18);
}

button:hover{
    transform:translateY(-2px);
    background:#ff69b4;
}

button:active{
    transform:scale(.95);
}

button:disabled{
    background:#bdbdbd;
    cursor:not-allowed;
}

#noticeBox{
    background:#fff8e8;
    border:1px solid #ffd98a;
    border-radius:18px;
    padding:15px 20px;
    margin-bottom:20px;
    font-size:16px;
    line-height:1.7;
    color:#555;
}

#noticeBox h3{
    margin:0 0 8px 0;
    color:#ff8c00;
    font-size:20px;
}

#noticeBox p{
    margin:0;
}
    
</style>

</head>

<body>

<div id="player">


<!-- 공지사항 영역 -->

<div id="noticeBox">

<h3>
📢 공지사항
</h3>

<p>
신청당일 23시까지 이용 가능하며 미사용횟수는 일괄 삭제됩니다.<br>
마지막 사용 횟수는 (일시정지) 기능이 작동하지 않습니다.<br>
부정하게 이용하거나 타인에게 공유 시 앞으로 이용이 제한됩니다.
</p>

</div>



<div id="info">

📺 사용 횟수 :
<b><span id="used"></span></b>회<br>

💖 남은 횟수 :
<b><span id="remain"></span></b>회

</div>



<video
id="video"
playsinline
controlsList="nodownload nofullscreen noremoteplayback"
disablePictureInPicture
>

<source src="SUNSHINE LOVE.mp4" type="video/mp4">

</video>



<!-- 볼륨 조절 -->

<div id="volumeBox">

🔊 볼륨 :

<input 
type="range" 
id="volume" 
min="0" 
max="100" 
value="100">

<span id="volumeValue">100%</span>

</div>



<div id="controls">

<button id="playBtn">
▶️ 재생
</button>

<button id="pauseBtn">
⏸️ 정지
</button>

</div>


</div>



<script>

// ===============================
// 이용 제한 설정
// ===============================

// 최대 재생 횟수
const MAX_PLAY = 3;
// 이용 시작 시간
const START_TIME = new Date("2026-07-18 00:00:00").getTime();
// 이용 종료 시간
const END_TIME = new Date("2026-07-18 03:12:00").getTime();
// 저장 키
const STORAGE_KEY="video_play_count";
// 날짜 저장 키
const DATE_KEY="video_use_date";

const video=document.getElementById("video");

const playBtn=document.getElementById("playBtn");

const pauseBtn=document.getElementById("pauseBtn");


const used=document.getElementById("used");

const remain=document.getElementById("remain");


const volume=document.getElementById("volume");

const volumeValue=document.getElementById("volumeValue");
// ===============================
// 기간 체크
// ===============================

function checkAccess(){


    const now = new Date().getTime();


    if(now < START_TIME || now > END_TIME){


        document.body.innerHTML = `

        <div style="
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f8f8ff;
        font-size:28px;
        font-weight:bold;
        text-align:center;
        ">

        🔒 이용 가능 시간이 종료되었습니다.<br>
        <br>
        이용 가능 시간:<br>
        09:00 ~ 23:00

        </div>

        `;


        return false;

    }


    return true;

}



if(!checkAccess()){

    throw new Error("접근 종료");

}
    
let today = new Date().toISOString().slice(0,10);


let savedDate = localStorage.getItem(DATE_KEY);


// 날짜가 바뀌면 횟수 초기화

if(savedDate !== today){

    localStorage.setItem(STORAGE_KEY,0);

    localStorage.setItem(DATE_KEY,today);

}



let count=Number(
    localStorage.getItem(STORAGE_KEY)||0
);


let isPlayingSession=false;



function updateInfo(){

    let left=MAX_PLAY-count;


    used.innerText=count;

    remain.innerText=left;



    if(left<=0){

        playBtn.disabled=true;

        playBtn.innerHTML="🔒 재생 불가";


        // 정지 버튼 비활성화 추가
        pauseBtn.disabled=true;

        pauseBtn.innerHTML="🔒 사용 종료";


        // 혹시 재생 중이면 정지
        video.pause();


    }else{

        playBtn.disabled=false;

        playBtn.innerHTML="▶️ 재생";


        pauseBtn.disabled=false;

        pauseBtn.innerHTML="⏸️ 정지";

    }

}



updateInfo();




playBtn.onclick=async()=>{


    if(video.ended){

        video.currentTime=0;

        isPlayingSession=false;

    }



    if(!isPlayingSession){


        if(count>=MAX_PLAY){

            alert("재생 횟수를 모두 사용했습니다.");

            return;

        }


        count++;


        localStorage.setItem(STORAGE_KEY,count);


        updateInfo();


        isPlayingSession=true;


    }



    try{


        await video.play();



        if(document.pictureInPictureEnabled &&
           !document.pictureInPictureElement){


            try{

                await video.requestPictureInPicture();

            }catch(e){

                console.log("자동 PiP 제한");

            }

        }


    }catch(e){

        console.log(e);

    }


};



pauseBtn.onclick=async()=>{

    if(video.paused){

        try{

            await video.play();

            pauseBtn.innerHTML="⏸️ 정지";

        }catch(e){

            console.log(e);

        }

    }else{

        video.pause();

        pauseBtn.innerHTML="▶️ 정지";

    }

};



// 볼륨 기능

volume.oninput=()=>{


    let value=volume.value;


    video.volume=value/100;


    volumeValue.innerText=value+"%";


};



// 초기 볼륨

video.volume=1;



video.onended=()=>{

    isPlayingSession=false;

};



// 우클릭 방지

document.addEventListener("contextmenu", function(e){

    e.preventDefault();

});


</script>


</body>

</html>
