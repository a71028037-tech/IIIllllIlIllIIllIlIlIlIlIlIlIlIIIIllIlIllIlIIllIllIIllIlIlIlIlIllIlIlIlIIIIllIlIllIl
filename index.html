<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>

body{
    margin:0;
    background:#f8f8ff;
    font-family:"Pretendard",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#player{
    width:760px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

video{
    width:100%;
    border-radius:20px;
    background:black;
}

#info{
    text-align:center;
    font-size:18px;
    margin-bottom:18px;
    line-height:1.8;
}

#controls{
    margin-top:20px;
    text-align:center;
}

button{
    background:#ff8fc7;
    color:white;
    border:none;
    border-radius:40px;
    padding:14px 28px;
    margin:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 6px 12px rgba(0,0,0,.18);
}

button:hover{
    transform:translateY(-2px);
    background:#ff69b4;
}

button:active{
    transform:scale(.95);
}

button:disabled{
    background:#bdbdbd;
    cursor:not-allowed;
}

#volume{
    width:150px;
    vertical-align:middle;
    accent-color:#ff8fc7;
    cursor:pointer;
}

#volumeText{
    font-weight:bold;
    margin-left:8px;
}    

</style>
</head>
<body>

<div id="player">
<div id="info">

🎥 총 재생 가능 :
<b><span id="maxCount"></span></b>회<br>
📺 사용 횟수 :
<b><span id="used"></span></b>회<br>
💖 남은 횟수 :
<b><span id="remain"></span></b>회
</div>

<video
id="video"
playsinline
controlsList="nodownload nofullscreen noremoteplayback"
disablePictureInPicture
>

<source src="SUNSHINE LOVE.mp4" type="video/mp4">
</video>

<div id="controls">

<button id="playBtn">▶️ 재생</button>
<button id="pauseBtn">⏸️ 일시정지</button>

<br>

<button id="muteBtn">🔊 음소거</button>

<input 
    id="volume"
    type="range"
    min="0"
    max="100"
    value="100"
>

<span id="volumeText">100%</span>

</div>

<script>

const MAX_PLAY = 3;

const STORAGE_KEY="video_play_count";

const video=document.getElementById("video");

const playBtn=document.getElementById("playBtn");

const pauseBtn=document.getElementById("pauseBtn");

const pipBtn=document.getElementById("pipBtn");

const maxCount=document.getElementById("maxCount");

const used=document.getElementById("used");

const remain=document.getElementById("remain");

const volume = document.getElementById("volume");
const volumeText = document.getElementById("volumeText");
const muteBtn = document.getElementById("muteBtn");

let savedVolume = 1;


// 볼륨 조절
volume.addEventListener("input", function(){

    let value = Number(this.value) / 100;

    video.volume = value;

    savedVolume = value;

    video.muted = false;

    muteBtn.innerHTML = "🔊 음소거";


    volumeText.innerHTML =
        this.value + "%";

}


// 음소거
muteBtn.addEventListener("click", function(){

    if(video.muted){

        video.muted = false;

        video.volume = savedVolume;

        volume.value = savedVolume * 100;

        volumeText.innerHTML =
            Math.round(savedVolume * 100) + "%";

        muteBtn.innerHTML="🔊 음소거";

    }
    else{

        savedVolume = video.volume;

        video.muted = true;

        volume.value = 0;

        volumeText.innerHTML="0%";

        muteBtn.innerHTML="🔇 음소거 해제";

    }

}
// 현재 재생 세션인지 여부
let isPlayingSession=false;

function updateInfo(){

    let left=MAX_PLAY-count;

    maxCount.innerText=MAX_PLAY;

    used.innerText=count;

    remain.innerText=left;

    if(left<=0){

        playBtn.disabled=true;

        playBtn.innerHTML="🔒 재생 불가";

    }else{

        playBtn.disabled=false;

        playBtn.innerHTML="▶️ 재생";

    }

}

updateInfo();

playBtn.onclick=async()=>{

    if(video.ended){

        video.currentTime=0;

        isPlayingSession=false;

    }

    // 새로운 재생만 차감
    if(!isPlayingSession){

        if(count>=MAX_PLAY){

            alert("재생 횟수를 모두 사용했습니다.");

            return;

        }

        count++;

        localStorage.setItem(STORAGE_KEY,count);

        updateInfo();

        isPlayingSession=true;

    }

    try{

        await video.play();

        // 자동 PiP
        if(document.pictureInPictureEnabled &&
           !document.pictureInPictureElement){

            try{

                await video.requestPictureInPicture();

            }catch(e){

                console.log("자동 PiP 제한");

            }

        }

    }catch(e){

        console.log(e);

    }

};

pauseBtn.onclick=()=>{

    video.pause();

};

pipBtn.onclick=async()=>{

    try{

        if(document.pictureInPictureElement){

            await document.exitPictureInPicture();

        }else{

            await video.requestPictureInPicture();

        }

    }catch(e){

        alert("PiP를 지원하지 않는 브라우저입니다.");

    }

};

video.onended=()=>{

    isPlayingSession=false;

};

// 전체 페이지 우클릭 방지
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});
    
</script>

</body>

</html>
